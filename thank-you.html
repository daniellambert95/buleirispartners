<!doctype html>
<html class="no-js" lang="en">
<head>
<title>Thank You - BLUE IRIS PARTNERS</title>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<link rel="shortcut icon" href="images/logo.png" type="image/png">
<link rel="icon" href="images/logo.png" type="image/png">
<link rel="stylesheet" href="css/vendors.min.css" />
<link rel="stylesheet" href="css/icon.min.css" />
<link rel="stylesheet" href="css/style.min.css" />
<link rel="stylesheet" href="css/responsive.min.css" />
<style>
body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.thank-you-container {
    background: white;
    padding: 60px 40px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
    max-width: 600px;
    animation: slideUp 0.6s ease-out;
}
@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
.checkmark {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: inline-block;
    background: #4CAF50;
    margin-bottom: 20px;
    position: relative;
    animation: scaleIn 0.5s ease-out 0.3s both;
}
@keyframes scaleIn {
    from {
        transform: scale(0);
    }
    to {
        transform: scale(1);
    }
}
.checkmark:after {
    content: '';
    position: absolute;
    top: 30%;
    left: 50%;
    width: 15px;
    height: 30px;
    border: solid white;
    border-width: 0 4px 4px 0;
    transform: translate(-50%, -50%) rotate(45deg);
}
h1 {
    color: #333;
    font-size: 32px;
    margin-bottom: 15px;
    font-weight: 600;
}
p {
    color: #666;
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 30px;
}
.btn-home {
    display: inline-block;
    padding: 12px 30px;
    background: #667eea;
    color: white;
    text-decoration: none;
    border-radius: 25px;
    font-weight: 500;
    transition: all 0.3s ease;
}
.btn-home:hover {
    background: #764ba2;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    color: white;
}
.redirect-info {
    margin-top: 20px;
    font-size: 14px;
    color: #999;
}
</style>
</head>
<body>

<div class="thank-you-container">
    <div class="checkmark"></div>
    <h1>Thank You!</h1>
    <p>Your message has been sent successfully. We appreciate you contacting BLUE IRIS PARTNERS.</p>
    <p>Our team will review your message and get back to you as soon as possible.</p>
    <a href="index.html" class="btn-home">Return to Home</a>
    <div class="redirect-info">
        <p>You will be automatically redirected to homepage in <span id="countdown">10</span> seconds...</p>
    </div>
</div>

<script>
// Auto redirect after 10 seconds
let seconds = 10;
const countdownElement = document.getElementById('countdown');

const countdown = setInterval(() => {
    seconds--;
    countdownElement.textContent = seconds;
    
    if (seconds <= 0) {
        clearInterval(countdown);
        window.location.href = 'index.html';
    }
}, 1000);
</script>

</body>
</html>
